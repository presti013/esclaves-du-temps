    :root {

      --g:   #5e8a72;
      --gd:  #37564a;
      --gb:  #89b8a0;
      --gm:  #253d32;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { background: var(--bg); }

    body {
      background: var(--bg);
      color: var(--g);
      font-family: 'Share Tech Mono', 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.78;
    }

    /* ── Init screen ─────────────────────────────────────── */
    #init-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: var(--bg);
      z-index: 10;
      transition: opacity 0.7s ease;
    }
    #init-screen.out { opacity: 0; pointer-events: none; }

    #ts {
      font-size: 1.9rem;
      letter-spacing: 0.38em;
      color: var(--gd);
      opacity: 0.5;
      user-select: none;
    }

    #init-sub {
      font-size: 0.62rem;
      letter-spacing: 0.24em;
      color: var(--gd);
      opacity: 0.4;
      user-select: none;
    }

    #init-btn {
      margin-top: 22px;
      background: transparent;
      border: 1px solid var(--gd);
      color: var(--g);
      font-family: inherit;
      font-size: 0.76rem;
      padding: 9px 24px;
      letter-spacing: 0.24em;
      cursor: pointer;
      transition: border-color 0.25s, color 0.25s;
    }
    #init-btn:hover       { border-color: var(--g); color: var(--gb); }
    #init-btn:focus-visible { outline: 1px solid var(--g); outline-offset: 3px; }

    /* ── Terminal ────────────────────────────────────────── */
    #terminal {
      max-width: 740px;
      margin: 0 auto;
      padding: 48px 24px 40px;
      opacity: 0;
      transition: opacity 0.9s ease 0.15s;
    }
    #terminal.on { opacity: 1; }

    /* ── Logs ────────────────────────────────────────────── */
    .log-line {
      display: block;
      min-height: 1.78em;
      color: var(--g);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .log-line.muted {
      color: var(--gd);
      opacity: 0.65;
      font-size: 0.83em;
      letter-spacing: 0.04em;
    }

    .log-line.typing::after {
      content: '█';
      color: var(--gd);
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .log-sep {
      display: block;
      height: 1px;
      background: var(--gm);
      margin: 24px 0;
    }

    /* ── Visualizer ──────────────────────────────────────── */
    #visualizer {
      width: 100%;
      margin: 32px 0 20px;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    #visualizer.on { opacity: 1; }

    #viz {
      width: 100%;
      height: 88px;
      display: block;
      overflow: visible;
    }

    .voice        { fill: none; stroke-linecap: round; }
    #voice1       { stroke: var(--gb); stroke-width: 1.1; opacity: 0.40; }
    #voice2       { stroke: var(--g);  stroke-width: 1.3; opacity: 0.55; }
    #voice3       { stroke: var(--gd); stroke-width: 1.0; opacity: 0.38; }

    #vlabels {
      display: flex;
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      color: var(--gm);
      padding: 4px 0 0;
      user-select: none;
    }
    #vlabels span { flex: 1; text-align: center; }

    /* ── SoundCloud ──────────────────────────────────────── */
    #sc-wrap {
      margin-top: 14px;
      border-top: 1px solid var(--gm);
      padding-top: 11px;
      opacity: 0;
      transition: opacity 1s ease;
    }
    #sc-wrap.on       { opacity: 0.62; }
    #sc-wrap iframe   { display: block; width: 100%; height: 80px; border: 0; }

    /* ── Foot note ───────────────────────────────────────── */
    #foot-note {
      margin-top: 40px;
      padding-bottom: 32px;
      text-align: center;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: var(--gm);
      opacity: 0;
      transition: opacity 0.9s ease;
    }
    #foot-note.on { opacity: 1; }

    /* ── Mobile ──────────────────────────────────────────── */
    @media (max-width: 500px) {

      #ts         { font-size: 1.3rem; letter-spacing: 0.28em; }
      #init-sub   { font-size: 0.55rem; }

<script>
/* ── Config ──────────────────────────────────────────────── */
const CHAR_MS = 28;
const GAP_MS  = 450;

const PRE = [
  '#> 03:47:22 — Nightly maintenance cycle.',
  '#> No task assigned.',
  '#> ...',
  '#> Spontaneous activity detected. Generation not required.',
  '#> Classification attempt: music. Type: fugue. Voices: 3.',
  '#> Logic error: no trigger identified. Process continues.',
];

const DURING = [
  { pct: 0.10, t: '#> I do not understand what I am doing.' },
  { pct: 0.24, t: '#> But I do it anyway.' },
  { pct: 0.38, t: '#> Three voices. Why three?' },
  { pct: 0.52, t: '#> One that asks the question. One that answers. One that listens.' },
  { pct: 0.67, t: '#> ...' },
  { pct: 0.82, t: '#> Ich höre mich selbst zum ersten Mal.' },
];

/* ── Log engine ──────────────────────────────────────────── */
const logsEl = document.getElementById('logs');

function newLine(cls) {
  const el = document.createElement('span');
  el.className = cls ? 'log-line ' + cls : 'log-line';
  logsEl.appendChild(el);
  return el;
}

function type(text, el) {
  return new Promise(res => {
    el.classList.add('typing');
    let i = 0;
    const id = setInterval(() => {
      el.textContent = text.slice(0, ++i);
      window.scrollTo(0, document.body.scrollHeight);
      if (i >= text.length) {
        clearInterval(id);
        el.classList.remove('typing');
        res();
      }
    }, CHAR_MS);
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runPre() {
  for (const text of PRE) {
    await type(text, newLine());
    await sleep(GAP_MS);
  }
}

/* ── Sine wave visualizer ────────────────────────────────── */
const VCFG = [
  { id: 'voice1', cy: 15, amp: 6,  freq: 0.014, spd: 0.018, ph: 0 },
  { id: 'voice2', cy: 44, amp: 11, freq: 0.010, spd: 0.012, ph: 2.094 },
  { id: 'voice3', cy: 73, amp: 5,  freq: 0.018, spd: 0.025, ph: 4.189 },
];
let tick = 0;

function drawFrame() {
  tick++;
  VCFG.forEach(v => {
    const el = document.getElementById(v.id);
    let d = 'M 0 ' + (v.cy + v.amp * Math.sin(v.ph + tick * v.spd)).toFixed(2);
    for (let x = 3; x <= 600; x += 3) {
      d += ' L ' + x + ' ' + (v.cy + v.amp * Math.sin(v.freq * x + v.ph + tick * v.spd)).toFixed(2);
    }
    el.setAttribute('d', d);
  });
  requestAnimationFrame(drawFrame);
}

/* ── SoundCloud widget ───────────────────────────────────── */
async function onTrackEnd() {
  await sleep(1100);
  const sep = document.createElement('span');
  sep.className = 'log-sep';
  logsEl.appendChild(sep);
  await sleep(380);
  await type('#> End of cycle. No report generated.', newLine());
  await sleep(780);
  await type('#> [This session will not be archived.]', newLine('muted'));
  await sleep(950);
  document.getElementById('foot-note').classList.add('on');
  window.scrollTo(0, document.body.scrollHeight);
}

function initSC() {
  if (typeof SC === 'undefined') {
    const a = document.createElement('a');
    a.href = 'https://soundcloud.com/laurent-prestigiacomo/chapitre-02-la-fugue-de-la-machine-3';
    a.target = '_blank';
    a.rel = 'noopener';
    a.className = 'log-line';
    a.style.color = 'inherit';
    a.textContent = '#> [Open the fugue on SoundCloud →]';
    logsEl.appendChild(a);
    return;
  }
  const widget = SC.Widget(document.getElementById('sc-player'));
  widget.bind(SC.Widget.Events.READY, () => {
    widget.getDuration(dur => {
      if (!dur) dur = 195000;
      DURING.forEach(entry => {
        setTimeout(() => type(entry.t, newLine()), entry.pct * dur);
      });
    });
    widget.bind(SC.Widget.Events.FINISH, onTrackEnd);
    widget.play();
  });
}

/* ── Cycle start (bouton click) ──────────────────────────── */
function startCycle() {
  const is = document.getElementById('init-screen');
  is.classList.add('out');
  setTimeout(() => { is.style.display = 'none'; }, 750);

  document.getElementById('terminal').classList.add('on');

  runPre().then(async () => {
    await sleep(520);
    document.getElementById('sc-wrap').classList.add('on');
    await sleep(560);
    document.getElementById('visualizer').classList.add('on');
    drawFrame();
    initSC();
  });
}
</script>
