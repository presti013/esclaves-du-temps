<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esclaves du Temps - L'Extraction</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #66fcf1;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        #naos-hud {
            width: 800px;
            background: rgba(31, 40, 51, 0.9);
            border: 2px solid #45f3ff;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(69, 243, 255, 0.3);
        }

        #naos-log {
            font-weight: bold;
            transition: color 0.3s ease;
        }

        canvas {
            border: 3px solid #1f2833;
            background-color: #121212;
            margin-top: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .ui-text {
            display: flex;
            justify-content: space-between;
            width: 800px;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="naos-hud">
        <span style="color: #ff4545;">#> [NAOS-9 — LOG OPÉRATIONNEL] :</span> 
        <span id="naos-log">Initiation Protocole EXODUS...</span>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <div class="ui-text">
        <span>SUJET: EL-03 (KAEL)</span>
        <span id="game-timer">TEMPS : 0.0s</span>
        <span id="game-score">SCORE : --</span>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const naosLog = document.getElementById('naos-log');
const timerDisplay = document.getElementById('game-timer');
const scoreDisplay = document.getElementById('game-score');

// Paramètres de jeu
let gameActive = true;
let startTime = Date.now();
let elapsedTime = 0;

// Variables du Joueur (Kael - Style Among Us, un petit ovale/bonhomme)
const player = {
    x: 50,
    y: 250,
    radius: 12,
    speed: 3,
    color: '#45f3ff'
};

// Murs du Complexe n°6 (Labyrinthe simple pour simuler les couloirs)
const walls = [
    {x: 0, y: 0, w: 800, h: 20},
    {x: 0, y: 480, w: 800, h: 20},
    {x: 0, y: 0, w: 20, h: 500},
    {x: 780, y: 0, w: 20, h: 500},
    // Obstacles intérieurs (générateurs et couloirs)
    {x: 150, y: 20, w: 40, h: 300},
    {x: 150, y: 400, w: 40, h: 80},
    {x: 300, y: 150, w: 50, h: 330},
    {x: 450, y: 20, w: 40, h: 250},
    {x: 600, y: 200, w: 40, h: 280}
];

// Zone d'extraction (Kazimir et le véhicule de maintenance)
const extractionZone = {
    x: 730,
    y: 220,
    w: 40,
    h: 60,
    color: '#39ff14'
};

// Gardes de l'Aegis-CD
const guards = [
    { x: 230, y: 50, direction: 1, speed: 1, rangeY: [50, 430], vision: 75 },
    { x: 390, y: 400, direction: -1, speed: 1, rangeY: [50, 440], vision: 80 },
    { x: 530, y: 80, direction: 1, speed: 1, rangeY: [40, 450], vision: 70 },
    { x: 690, y: 300, direction: -1, speed: 1, rangeY: [100, 420], vision: 85 }
];

// Gestion des touches du clavier
const keys = {};
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

// Détection de collision cercle/rectangle (pour les murs)
function checkWallCollision(rect, circle) {
    let closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
    let closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
    let distanceX = circle.x - closestX;
    let distanceY = circle.y - closestY;
    let distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);
    return distanceSquared < (circle.radius * circle.radius);
}

// IA NAOS-9 : Analyse la distance du danger et met à jour le HUD
function updateNaosAI(minDistance) {
    if (minDistance < 60) {
        naosLog.innerText = "DANGER IMMINENT ! Capteurs biologiques en alerte. Ralentissez !";
        naosLog.style.color = "#ff4545"; // Rouge
    } else if (minDistance < 130) {
        naosLog.innerText = "ATTENTION : Patrouille Aegis en approche. Synchronisation requise.";
        naosLog.style.color = "#ffa500"; // Orange
    } else {
        naosLog.innerText = "Voie libre. Trajectoire conforme vers la Zone Morte 7-K.";
        naosLog.style.color = "#39ff14"; // Vert
    }
}

// Boucle principale du jeu
function update() {
    if (!gameActive) return;

    // Calcul du temps écoulé
    elapsedTime = ((Date.now() - startTime) / 1000).toFixed(1);
    timerDisplay.innerText = `TEMPS : ${elapsedTime}s`;

    // Sauvegarde de l'ancienne position pour la physique des collisions
    const oldX = player.x;
    const oldY = player.y;

    // Déplacements
    if (keys['ArrowUp'] || keys['z']) player.y -= player.speed;
    if (keys['ArrowDown'] || keys['s']) player.y += player.speed;
    
    // Vérification collision murs sur l'axe Y
    for (let wall of walls) {
        if (checkWallCollision(wall, player)) { player.y = oldY; break; }
    }

    if (keys['ArrowLeft'] || keys['q']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['d']) player.x += player.speed;

    // Vérification collision murs sur l'axe X
    for (let wall of walls) {
        if (checkWallCollision(wall, player)) { player.x = oldX; break; }
    }

    // Mise à jour et logique des gardes + calcul de la distance minimale de Kael au danger
    let minDistanceToGuard = 9999;

    for (let guard of guards) {
        guard.y += guard.speed * guard.direction;
        if (guard.y < guard.rangeY[0] || guard.y > guard.rangeY[1]) {
            guard.direction *= -1; // Demi-tour
        }

        // Distance entre Kael et ce garde
        let dx = player.x - guard.x;
        let dy = player.y - guard.y;
        let distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < minDistanceToGuard) {
            minDistanceToGuard = distance;
        }

        // Condition de défaite : Si Kael entre dans le rayon de vision du garde
        if (distance < guard.vision) {
            gameActive = false;
            naosLog.innerText = "[ALERTE] Sujet détecté par l'Aegis-CD. Protocole échoué.";
            naosLog.style.color = "#ff4545";
            alert("Repéré ! Les gardes vous ont capturé. Le champ de compression temporelle vous renvoie en cellule.");
            resetGame();
            return;
        }
    }

    // Mettre à jour les conseils de NAOS-9
    updateNaosAI(minDistanceToGuard);

    // Condition de victoire : Atteindre le véhicule de Kazimir
    if (player.x + player.radius > extractionZone.x && 
        player.y > extractionZone.y && player.y < extractionZone.y + extractionZone.h) {
        gameActive = false;
        let finalScore = Math.max(100, 1000 - Math.floor(elapsedTime * 15));
        naosLog.innerText = "Extraction réussie. Kazimir a démarré le moteur. Bien joué Kael.";
        naosLog.style.color = "#39ff14";
        scoreDisplay.innerText = `SCORE FINAL : ${finalScore} pts`;
        alert(`Victoire ! Vous vous êtes échappé en ${elapsedTime} secondes. Score : ${finalScore} points.`);
    }
}

// Rendu Graphique
function draw() {
    // Nettoyage du canvas
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Dessiner les murs
    ctx.fillStyle = '#1f2833';
    for (let wall of walls) {
        ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
    }

    // Dessiner la zone d'extraction (Le van de Kazimir)
    ctx.fillStyle = extractionZone.color;
    ctx.fillRect(extractionZone.x, extractionZone.y, extractionZone.w, extractionZone.h);
    ctx.fillStyle = '#000';
    ctx.font = '10px Courier';
    ctx.fillText('VAN', extractionZone.x + 10, extractionZone.y + 35);

    // Dessiner les Gardes (Cercle avec zone d'alerte rouge style Among Us)
    for (let guard of guards) {
        // Champ de vision
        ctx.beginPath();
        ctx.arc(guard.x, guard.y, guard.vision, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 69, 69, 0.15)';
        ctx.fill();

        // Le garde lui-même
        ctx.beginPath();
        ctx.arc(guard.x, guard.y, 10, 0, Math.PI * 2);
        ctx.fillStyle = '#ff4545';
        ctx.fill();
    }

    // Dessiner Kael (Avatar style Among Us simplifié : un corps cyan et une visière noire)
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fillStyle = player.color;
    ctx.fill();
    // Petite visière
    ctx.fillStyle = '#000';
    ctx.fillRect(player.x + 2, player.y - 5, 6, 6);
}

function resetGame() {
    player.x = 50;
    player.y = 250;
    startTime = Date.now();
    gameActive = true;
}

// Boucle de jeu fluide
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Lancement
gameLoop();
</script>
</body>
</html>
